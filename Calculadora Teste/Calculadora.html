<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <link rel="stylesheet" href="../Calculadora Teste/Calculadora.css">
</head>
<body>
    <div class="Main">

        <div id="Resultado"></div>

        <div id="quadro">
            <button class="number" id="number1" onclick="exibirNumero(1)">1</button>
            <button class="number" id="number2" onclick="exibirNumero(2)">2</button>
            <button class="number" id="number3" onclick="exibirNumero(3)">3</button>
            <button class="number" id="number4" onclick="exibirNumero(4)">4</button>
            <button class="number" id="number5" onclick="exibirNumero(5)">5</button>
            <button class="number" id="number6" onclick="exibirNumero(6)">6</button>
            <button class="number" id="number7" onclick="exibirNumero(7)">7</button>
            <button class="number" id="number8" onclick="exibirNumero(8)">8</button>
            <button class="number" id="number9" onclick="exibirNumero(9)">9</button>
            <button class="number" id="number0" onclick="exibirNumero(0)">0</button>
            <button class="number" id="CE" onclick="limpar()">CE</button>
        </div>

        <div class="simbolos">
            <button id="simbol">+</button>
            <button id="simbol">-</button>
            <button id="simbol">.</button>
            <button id="simbol">÷</button>
        </div>
        <div class="calcular">
            <button id="Calcular" onclick="calculo()">Calcular</button>
        </div>
    </div>
</body>

<script>

    let visor = document.getElementById("Resultado");
    visor.innerText = "0"; // Inicializa o visor com 0

    function exibirNumero(numero) {
        // Evita que o primeiro número seja "0" desnecessariamente
        if (visor.innerText === "0") {
            visor.innerText = numero;
        } else {
            visor.innerText += numero;
        }
    }

    function exibirOperador(operador) {
        let ultimoCaractere = visor.innerText.slice(-1);
        
        // Impede múltiplos operadores seguidos
        if ("+-*/".includes(ultimoCaractere)) {
            return;
        }
        visor.innerText += operador;
    }

    function limpar() {
        visor.innerText = "0"; // Reseta o visor
    }

    function calculo() {
        try {
            visor.innerText = eval(visor.innerText.replace("÷", "/")); // Calcula a expressão
        } catch {
            visor.innerText = "Erro"; // Exibe erro se houver erro na expressão
        }
    }

    // Adicionando eventos para os botões de operadores
    document.querySelectorAll(".simbolos button").forEach(button => {
        button.addEventListener("click", function() {
            exibirOperador(this.innerText);
        });
    });


</script>

</html>
